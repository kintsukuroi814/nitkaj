<!DOCTYPE html>
<html lang="sl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navodila za ustno higieno</title>
  <meta name="description" content="Večjezična stran z navodili za paciente o čiščenju medzobnih prostorov, mostičkov, protez in teleskopskih protez." />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@500,700&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root, [data-theme="light"] {
      --bg: #f4f8f7; --surface: #ffffff; --surface-2: #edf4f2; --border: #cddbd7;
      --text: #1a2926; --muted: #4d6b65; --faint: #7a9992;
      --accent: #00857a; --accent-h: #006b62; --blue: #1a6fa8;
      --sh-sm: 0 2px 10px rgba(0,120,100,.07); --sh-md: 0 16px 40px rgba(0,80,70,.10);
      --r-sm:.5rem; --r-md:.9rem; --r-lg:1.4rem; --r-full:9999px;
      --font-body:'Satoshi',system-ui,sans-serif; --font-display:'Boska',Georgia,serif;
      --content:1140px;
      --bg-orb-1: rgba(0,133,122,.13); --bg-orb-2: rgba(26,111,168,.10); --bg-orb-3: rgba(0,133,122,.07);
    }


    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body); font-size: clamp(1rem,.96rem + .2vw,1.125rem);
      line-height: 1.7; color: var(--text);
      background: var(--bg); min-height: 100vh;
      transition: background .4s, color .4s;
      overflow-x: hidden;
    }
    a { color: var(--accent); }
    img, svg { display: block; max-width: 100%; height: auto; }
    button, select { font: inherit; cursor: pointer; }

    /* ── ANIMATED BACKGROUND ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat linear infinite;
      will-change: transform;
    }
    .orb-1 {
      width: min(600px, 60vw); height: min(600px, 60vw);
      background: var(--bg-orb-1);
      top: -10%; left: -10%;
      animation-duration: 28s;
      animation-name: orbFloat1;
    }
    .orb-2 {
      width: min(500px, 50vw); height: min(500px, 50vw);
      background: var(--bg-orb-2);
      bottom: -5%; right: -5%;
      animation-duration: 34s;
      animation-name: orbFloat2;
    }
    .orb-3 {
      width: min(400px, 45vw); height: min(400px, 45vw);
      background: var(--bg-orb-3);
      top: 40%; left: 40%;
      animation-duration: 22s;
      animation-name: orbFloat3;
    }
    @keyframes orbFloat1 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(8vw, 6vh) scale(1.08); }
      66%  { transform: translate(3vw, 14vh) scale(.95); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orbFloat2 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(-6vw,-8vh) scale(1.1); }
      66%  { transform: translate(-12vw,-3vh) scale(.92); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orbFloat3 {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(-8vw, 8vh) scale(1.15); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* subtle bubbles — tooth-like circles floating up */
    .bubbles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bubble {
      position: absolute; border-radius: 50%;
      border: 1.5px solid color-mix(in srgb, var(--accent) 22%, transparent);
      animation: bubbleRise linear infinite;
      bottom: -60px;
    }
    @keyframes bubbleRise {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      85%  { opacity: .6; }
      100% { transform: translateY(-110vh) scale(1.1); opacity: 0; }
    }

    /* ── LAYOUT ── */
    .wrap { position: relative; z-index: 1; }
    .container { width: min(calc(100% - 2rem), var(--content)); margin-inline: auto; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 40;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      transition: background .4s;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; padding: .85rem 0;
    }
    .brand {
      display: flex; align-items: center; gap: .75rem;
      text-decoration: none; color: inherit;
    }
    .brand-mark {
      width: 2.2rem; height: 2.2rem; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      display: grid; place-items: center;
      box-shadow: var(--sh-sm);
      flex-shrink: 0;
    }
    .brand strong { display: block; font-size: clamp(.9rem,.85rem + .2vw,1.05rem); }
    .brand small { display: block; color: var(--muted); font-size: .8rem; }
    .top-controls { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
    .btn-compact {
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      border-radius: var(--r-full); padding: .55rem .95rem;
      font-size: .875rem; text-decoration: none; white-space: nowrap;
      transition: border-color .2s, background .2s;
    }
    .btn-compact:hover { border-color: var(--accent); }
    .lang-select { min-width: 200px; }

    /* ── HERO ── */
    .hero { padding: clamp(2.5rem,8vw,5.5rem) 0 1.5rem; }
    .hero-grid { display: grid; grid-template-columns: 1.25fr .85fr; gap: 2.5rem; align-items: start; }
    h1 {
      font-family: var(--font-display); font-size: clamp(2.2rem,1.4rem + 2.2vw,3.5rem);
      line-height: 1.1; max-width: 13ch; margin-bottom: .8rem;
    }
    h2 { font-size: clamp(1.4rem,1.1rem + .8vw,1.9rem); line-height: 1.18; margin-bottom: .6rem; }
    h3 { font-size: clamp(1.1rem,.95rem + .5vw,1.35rem); line-height: 1.22; margin-bottom: .55rem; }
    p { max-width: 72ch; }
    .lede { color: var(--muted); max-width: 60ch; margin-top: .6rem; }

    /* ── CARDS ── */
    .card, .hero-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      padding: 1.4rem 1.5rem;
    }
    .hero-card { background: color-mix(in srgb, var(--accent) 6%, var(--surface)); }
    ul.clean { padding-left: 1.3rem; }
    ul.clean li + li { margin-top: .5rem; }

    /* ── STEPS ── */
    .steps { list-style: none; counter-reset: step; margin-top: .8rem; }
    .steps li {
      display: flex; gap: .9rem; align-items: flex-start;
      border-top: 1px solid var(--border); padding: .9rem 0;
    }
    .steps li:first-child { border-top: 0; padding-top: 0; }
    .steps li::before {
      counter-increment: step; content: counter(step);
      width: 2rem; height: 2rem; flex: 0 0 2rem;
      display: grid; place-items: center;
      border-radius: 50%; background: var(--accent); color: #fff;
      font-weight: 700; font-size: .9rem;
    }

    /* ── GRID ── */
    section { padding: 1.1rem 0; }
    .grid { display: grid; gap: 1.4rem; }
    .three { grid-template-columns: repeat(3,1fr); }
    .two   { grid-template-columns: repeat(2,1fr); }

    /* ── ILLUSTRATION CARD ── */
    .illus-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      display: flex; flex-direction: column;
    }
    .illus-top {
      padding: 2.2rem 1.8rem 1.6rem;
      background: linear-gradient(150deg, color-mix(in srgb, var(--accent) 9%, var(--surface)), var(--surface));
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      display: flex; justify-content: center;
    }
    .illus-top svg { width: 100%; max-width: 260px; height: auto; min-height: 160px; }
    .illus-body { padding: 1.2rem 1.5rem 1.4rem; }

    /* ── NOTE ── */
    .note {
      background: color-mix(in srgb, var(--accent) 8%, var(--surface-2));
      border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border));
      border-left: 3px solid var(--accent);
      border-radius: var(--r-md); padding: 1rem 1.2rem;
      margin-top: 1.2rem;
    }

    /* ── REFERENCES ── */
    .reference-list { display: grid; gap: .8rem; margin-top: 1rem; }
    .reference-item {
      padding: .9rem 1.1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r-md);
      font-size: .88rem;
    }
    .reference-item a { word-break: break-all; }

    /* ── PRODUCT CARDS ── */
    .products-section { padding: 1.4rem 0 .5rem; }
    .products-section h2 { margin-bottom: 1.1rem; }
    .product-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .product-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      display: flex; flex-direction: column;
      transition: box-shadow .2s, border-color .2s;
    }
    .product-card:hover { box-shadow: var(--sh-md); border-color: var(--accent); }
    .product-card-top {
      padding: 1.1rem 1.3rem .7rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: .75rem;
    }
    .product-icon {
      width: 2.4rem; height: 2.4rem; flex-shrink: 0;
      border-radius: var(--r-sm);
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 15%, var(--surface)), color-mix(in srgb, var(--accent) 5%, var(--surface)));
      display: grid; place-items: center;
    }
    .product-brand { font-size: .72rem; font-weight: 700; letter-spacing: .08em; color: var(--faint); text-transform: uppercase; margin-bottom: .18rem; }
    .product-name { font-weight: 700; font-size: .98rem; line-height: 1.25; }
    .product-body { padding: .75rem 1.3rem; font-size: .88rem; color: var(--muted); line-height: 1.6; flex: 1; }
    .product-body p + p { margin-top: .5rem; }
    .product-footer { padding: .7rem 1.3rem 1.1rem; }
    .product-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--accent); font-size: .875rem; font-weight: 500;
      text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      transition: border-color .2s;
    }
    .product-link:hover { border-color: var(--accent); }
    .product-tag {
      display: inline-block; font-size: .72rem; font-weight: 600;
      padding: .15rem .5rem; border-radius: var(--r-full);
      background: color-mix(in srgb, var(--accent) 12%, var(--surface-2));
      color: var(--accent); margin-bottom: .5rem;
    }
    /* ── FLOSS GUIDE TABLE ── */
    .floss-guide {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      overflow: hidden; margin-top: .5rem;
    }
    .floss-guide table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .floss-guide thead { background: color-mix(in srgb, var(--accent) 10%, var(--surface-2)); }
    .floss-guide th { padding: .75rem 1rem; text-align: left; font-weight: 700; color: var(--accent); }
    .floss-guide td { padding: .65rem 1rem; border-top: 1px solid var(--border); vertical-align: top; }
    .floss-guide tr:hover td { background: var(--surface-2); }
    /* ── VIDEO BANNER ── */
    .video-banner {
      background: linear-gradient(120deg, color-mix(in srgb, var(--accent) 14%, var(--surface)), color-mix(in srgb, var(--blue) 10%, var(--surface)));
      border: 1.5px solid color-mix(in srgb, var(--accent) 30%, var(--border));
      border-radius: var(--r-lg); padding: 1.6rem 2rem;
      display: flex; align-items: center; gap: 1.5rem;
      margin-top: 1.4rem; text-decoration: none; color: inherit;
      transition: box-shadow .2s, border-color .2s;
    }
    .video-banner:hover { box-shadow: var(--sh-md); border-color: var(--accent); }
    .video-play {
      width: 3.5rem; height: 3.5rem; flex-shrink: 0; border-radius: 50%;
      background: var(--accent); display: grid; place-items: center;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 40%, transparent);
    }
    .video-text strong { display: block; font-size: 1.1rem; margin-bottom: .2rem; }
    .video-text span { color: var(--muted); font-size: .9rem; }
    /* ── FOOTER ── */
    footer { padding: 2.5rem 0 3.5rem; color: var(--muted); font-size: .9rem; border-top: 1px solid var(--border); margin-top: 1rem; }

    /* ── REFERENCES ACCORDION ── */
  .ref-accordion {
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0;
    overflow: hidden;
  }
  .ref-accordion summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.4rem;
    cursor: pointer;
    font-weight: 600;
    font-size: 1.05rem;
    list-style: none;
    user-select: none;
    gap: .6rem;
    color: var(--text);
  }
  .ref-accordion summary::-webkit-details-marker { display: none; }
  .ref-accordion summary:hover { background: var(--hover-bg, rgba(0,0,0,.03)); }
  .ref-accordion[open] summary { border-bottom: 1px solid var(--border); }
  .ref-accordion .ref-chevron { flex-shrink: 0; transition: transform .25s ease; color: var(--accent); }
  .ref-accordion[open] .ref-chevron { transform: rotate(180deg); }
  .ref-accordion .reference-list,
  .ref-accordion .lede {
    padding: 0 1.4rem;
  }
  .ref-accordion .lede { padding-top: .8rem; }
  .ref-accordion .reference-list { padding-bottom: 1.2rem; }

  /* ── INDIVIDUAL PLAN NOTE ── */
  .indiv-plan-note {
    border-radius: var(--radius);
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 8%, var(--surface)), var(--surface));
    border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border));
    padding: 1.2rem 1.4rem;
  }

  /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-grid, .three, .two { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .top-controls { width: 100%; }
      .lang-select { flex: 1; min-width: 0; }
    }
  </style>
</head>

<main id="main"></main>

</div>

    it: { title: 'Il tuo piano personalizzato di igiene orale', body: 'Non esiste un metodo unico per tutti — la dimensione dello scovolino, il tipo di filo e l’ordine della pulizia dipendono dalla forma dei tuoi denti, dalla presenza di ponti, impianti o protesi e dalle condizioni delle tue gengive.\n\nL’igienista dentale, in collaborazione con il dentista o il parodontologo, elabora un piano personalizzato su misura per la tua situazione. Una soluzione non va bene per tutti — il tuo piano è il tuo.' },
    sq: { title: 'Plani juaj individual i higiënës me gojë', body: 'Asnjë metodë nuk i përshtatet të gjithëve — madhësia e furçës ndërdentale, lloji i perit dhe radha e pastrimit varen nga forma e dhëmbëve tuaj, prania e urave, implanteve ose protezave dhe gjendja e mishrave të dhëmbëve.\n\nHigienisti dentar, në bashkëpunim me dentistin ose parodontologun tuaj, krijon një plan individual të përshtatur për situatën tuaj specifike. Një udhëzim nuk u përshtatet të gjithëve — plani juaj është yni.' },
    ar: { title: 'خطتك الشخصية لنظافة الفم', body: 'لا تناسب طريقة واحدة الجميع — حجم فرشاة التنظيف بين الأسنان ونوع الخيط وتسلسل التنظيف يعتمد على شكل أسنانك ووجود جسور أو غرسات أو طقام وحالة لثتك.\n\nمنظف الأسنان ، بالتعاون مع طبيبك أو طبيب أمراض اللثة، يضع خطة فردية مصممة لوضعك تحديداً. خطتك خاصة بك.' },
    mk: { title: 'Вашиот индивидуален план за усна хигиена', body: 'Ниту еден метод не одговара за секого — големината на меѓузабната четка, видот на конецот и редоследот на чистење зависат од формата на вашите заби, присуството на мостови, импланти или протези и состојбата на вашите венци.\n\nДенталниот хигиеничар, во соработка со вашиот стоматолог или пародонтолог, израбува индивидуален план соодветен за вашата ситуација. Едно упатство не одговара за секого — вашиот план е ваш.' },
    hu: { title: 'Személyre szabott szájhigiéniai terve', body: 'Nem minden módszer megfelelő mindenki számára — a fogközti kefe mérete, a fogselyem típusa és a tisztítás sorrendje az Ön fogainak alakjától, a hidak, implantátumok vagy fogsor jelenlététől, valamint a fogínye állapotától függ.\n\nA fogászati higiénikus, az Ön fogorvosával vagy periodontológusával együttműködve, az Ön egyedi helyzetéhez szabott egyéni tervet dolgoz ki. Egy megoldás nem illik mindenkire — az Ön terve az Öné.' },
    ru: { title: 'Ваш индивидуальный план гигиены полости рта', body: 'Не каждый метод подходит всем — размер межзубной щётки, вид нити и порядок чистки зависят от формы ваших зубов, наличия мостов, имплантов или протезов, а также состояния дёсен.\n\nГигиенист полости рта, работая вместе с вашим стоматологом или пародонтологом, составит индивидуальный план, подобранный именно под вашу ситуацию. Одна инструкция не подходит всем — ваш план — ваш.' },
    uk: { title: 'Ваш індивідуальний план гігієни порожнини рота', body: 'Жоден метод не підходить для всіх — розмір міжзубної щітки, тип нитки та порядок чищення залежать від форми ваших зубів, наявності мостів, імплантів чи протезів і стану ясен.\n\nГігієніст порожнини рота, співпрацюючи з вашим стоматологом чи пародонтологом, складає індивідуальний план, адаптований до вашої ситуації. Одна порада не підходить для всіх — ваш план — ваш.' }
  };

  /* ── RENDER ENGINE ── */
  function buildCard(c, size) {
    if(c.illus) {
      return `<article class="illus-card">
        <div class="illus-top">${SVG[c.illus]||''}</div>
        <div class="illus-body">
          <h3>${c.title}</h3>
          ${c.steps ? `<ol class="steps">${c.steps.map(s=>`<li>${s}</li>`).join('')}</ol>` : ''}
          ${c.list  ? `<ul class="clean" style="margin-top:.6rem">${c.list.map(s=>`<li>${s}</li>`).join('')}</ul>` : ''}
          ${c.body  ? c.body.split('\n\n').map(p=>`<p>${p}</p>`).join('') : ''}
        </div>
      </article>`;
    }
    return `<article class="card">
      <h${size||3}>${c.title}</h${size||3}>
      ${c.steps ? `<ol class="steps">${c.steps.map(s=>`<li>${s}</li>`).join('')}</ol>` : ''}
      ${c.list  ? `<ul class="clean" style="margin-top:.6rem">${c.list.map(s=>`<li>${s}</li>`).join('')}</ul>` : ''}
      ${c.body  ? c.body.split('\n\n').map(p=>`<p>${p}</p>`).join('') : ''}
    </article>`;
  }

  function render(langCode) {
    const lang = langs[langCode] || langs.sl;
    const d = document.documentElement;
    d.lang = lang.htmlLang || langCode;
    d.dir  = lang.dir || 'ltr';
    document.body.dir = lang.dir || 'ltr';

    // Update header labels
    const ui = lang.ui;
    document.getElementById('brand_title').textContent    = ui.brand_title;
    document.getElementById('brand_sub').textContent      = ui.brand_sub;
    document.getElementById('language_label').textContent = ui.language_label;
    document.getElementById('footer_text').textContent    = ui.footer_text;

    // Build page
    const heroCard = `<aside class="hero-card">
      <h2>${lang.quicklist_title}</h2>
      <ul class="clean">${lang.quicklist.map(i=>`<li>${i}</li>`).join('')}</ul>
    </aside>`;

    const sectionsHTML = `<section class="container">
      <div class="grid three">
        ${lang.sections.map(s=>buildCard(s)).join('')}
      </div>
    </section>`;

    const cards2HTML = `<section class="container">
      <div class="grid two">
        ${lang.cards2.map(c=>buildCard(c,2)).join('')}
      </div>
    </section>`;

    const cards3HTML = `<section class="container">
      <div class="grid three">
        ${lang.cards3.map(c=>buildCard(c,3)).join('')}
      </div>
    </section>`;

    const cards2bHTML = `<section class="container">
      <div class="grid two">
        ${lang.cards2b.map(c=>buildCard(c,2)).join('')}
      </div>
      <div class="note">${lang.note}</div>
    </section>`;

    document.getElementById('main').innerHTML = `
      <section class="hero container" id="top">
        <div class="hero-grid">
          <div>
            <h1>${lang.hero_title}</h1>
            <p class="lede">${lang.hero_lede}</p>
          </div>
          ${heroCard}
        </div>
      </section>
      ${sectionsHTML}
      ${cards2HTML}
      ${cards3HTML}
      ${cards2bHTML}
      ${buildProductsSection(langCode)}
      ${refHTML}
    `;

    // Update refs
    const rTitle = document.getElementById('references_title');
    const rIntro = document.getElementById('references_intro');
    if(rTitle) rTitle.textContent = ui.references_title;
    if(rIntro) rIntro.textContent = ui.references_intro;

    // Calendar month label in SVG
    const calEl = document.getElementById('cal-month');
    if(calEl) calEl.textContent = ui.cal_month || 'APRIL';
  }

  /* ── EVENTS ── */
  document.getElementById('languageSelect').addEventListener('change', e => render(e.target.value));
  render('sl');
})();
</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
