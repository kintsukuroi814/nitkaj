<!DOCTYPE html>
<html lang="sl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navodila za ustno higieno</title>
  <meta name="description" content="Večjezična stran z navodili za paciente o čiščenju medzobnih prostorov, mostičkov, protez in teleskopskih protez." />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@500,700&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root, [data-theme="light"] {
      --bg: #f4f8f7; --surface: #ffffff; --surface-2: #edf4f2; --border: #cddbd7;
      --text: #1a2926; --muted: #4d6b65; --faint: #7a9992;
      --accent: #00857a; --accent-h: #006b62; --blue: #1a6fa8;
      --sh-sm: 0 2px 10px rgba(0,120,100,.07); --sh-md: 0 16px 40px rgba(0,80,70,.10);
      --r-sm:.5rem; --r-md:.9rem; --r-lg:1.4rem; --r-full:9999px;
      --font-body:'Satoshi',system-ui,sans-serif; --font-display:'Boska',Georgia,serif;
      --content:1140px;
      --bg-orb-1: rgba(0,133,122,.13); --bg-orb-2: rgba(26,111,168,.10); --bg-orb-3: rgba(0,133,122,.07);
    }
    [data-theme="dark"] {
      --bg: #0f1a18; --surface: #172220; --surface-2: #1e2e2b; --border: #2a3d39;
      --text: #ddeae7; --muted: #8ab5ae; --faint: #5a8078;
      --accent: #3fbfb4; --accent-h: #5ccfc4; --blue: #6aaed8;
      --sh-sm: 0 2px 10px rgba(0,0,0,.3); --sh-md: 0 16px 40px rgba(0,0,0,.45);
      --bg-orb-1: rgba(63,191,180,.10); --bg-orb-2: rgba(106,174,216,.08); --bg-orb-3: rgba(63,191,180,.05);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body); font-size: clamp(1rem,.96rem + .2vw,1.125rem);
      line-height: 1.7; color: var(--text);
      background: var(--bg); min-height: 100vh;
      transition: background .4s, color .4s;
      overflow-x: hidden;
    }
    a { color: var(--accent); }
    img, svg { display: block; max-width: 100%; height: auto; }
    button, select { font: inherit; cursor: pointer; }

    /* ── ANIMATED BACKGROUND ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat linear infinite;
      will-change: transform;
    }
    .orb-1 {
      width: min(600px, 60vw); height: min(600px, 60vw);
      background: var(--bg-orb-1);
      top: -10%; left: -10%;
      animation-duration: 28s;
      animation-name: orbFloat1;
    }
    .orb-2 {
      width: min(500px, 50vw); height: min(500px, 50vw);
      background: var(--bg-orb-2);
      bottom: -5%; right: -5%;
      animation-duration: 34s;
      animation-name: orbFloat2;
    }
    .orb-3 {
      width: min(400px, 45vw); height: min(400px, 45vw);
      background: var(--bg-orb-3);
      top: 40%; left: 40%;
      animation-duration: 22s;
      animation-name: orbFloat3;
    }
    @keyframes orbFloat1 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(8vw, 6vh) scale(1.08); }
      66%  { transform: translate(3vw, 14vh) scale(.95); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orbFloat2 {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(-6vw,-8vh) scale(1.1); }
      66%  { transform: translate(-12vw,-3vh) scale(.92); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes orbFloat3 {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(-8vw, 8vh) scale(1.15); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* subtle bubbles — tooth-like circles floating up */
    .bubbles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bubble {
      position: absolute; border-radius: 50%;
      border: 1.5px solid color-mix(in srgb, var(--accent) 22%, transparent);
      animation: bubbleRise linear infinite;
      bottom: -60px;
    }
    @keyframes bubbleRise {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      85%  { opacity: .6; }
      100% { transform: translateY(-110vh) scale(1.1); opacity: 0; }
    }

    /* ── LAYOUT ── */
    .wrap { position: relative; z-index: 1; }
    .container { width: min(calc(100% - 2rem), var(--content)); margin-inline: auto; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 40;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      transition: background .4s;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; padding: .85rem 0;
    }
    .brand {
      display: flex; align-items: center; gap: .75rem;
      text-decoration: none; color: inherit;
    }
    .brand-mark {
      width: 2.2rem; height: 2.2rem; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      display: grid; place-items: center;
      box-shadow: var(--sh-sm);
      flex-shrink: 0;
    }
    .brand strong { display: block; font-size: clamp(.9rem,.85rem + .2vw,1.05rem); }
    .brand small { display: block; color: var(--muted); font-size: .8rem; }
    .top-controls { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
    .btn-compact {
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      border-radius: var(--r-full); padding: .55rem .95rem;
      font-size: .875rem; text-decoration: none; white-space: nowrap;
      transition: border-color .2s, background .2s;
    }
    .btn-compact:hover { border-color: var(--accent); }
    .lang-select { min-width: 200px; }

    /* ── HERO ── */
    .hero { padding: clamp(2.5rem,8vw,5.5rem) 0 1.5rem; }
    .hero-grid { display: grid; grid-template-columns: 1.25fr .85fr; gap: 2.5rem; align-items: start; }
    h1 {
      font-family: var(--font-display); font-size: clamp(2.2rem,1.4rem + 2.2vw,3.5rem);
      line-height: 1.1; max-width: 13ch; margin-bottom: .8rem;
    }
    h2 { font-size: clamp(1.4rem,1.1rem + .8vw,1.9rem); line-height: 1.18; margin-bottom: .6rem; }
    h3 { font-size: clamp(1.1rem,.95rem + .5vw,1.35rem); line-height: 1.22; margin-bottom: .55rem; }
    p { max-width: 72ch; }
    .lede { color: var(--muted); max-width: 60ch; margin-top: .6rem; }

    /* ── CARDS ── */
    .card, .hero-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      padding: 1.4rem 1.5rem;
    }
    .hero-card { background: color-mix(in srgb, var(--accent) 6%, var(--surface)); }
    ul.clean { padding-left: 1.3rem; }
    ul.clean li + li { margin-top: .5rem; }

    /* ── STEPS ── */
    .steps { list-style: none; counter-reset: step; margin-top: .8rem; }
    .steps li {
      display: flex; gap: .9rem; align-items: flex-start;
      border-top: 1px solid var(--border); padding: .9rem 0;
    }
    .steps li:first-child { border-top: 0; padding-top: 0; }
    .steps li::before {
      counter-increment: step; content: counter(step);
      width: 2rem; height: 2rem; flex: 0 0 2rem;
      display: grid; place-items: center;
      border-radius: 50%; background: var(--accent); color: #fff;
      font-weight: 700; font-size: .9rem;
    }

    /* ── GRID ── */
    section { padding: 1.1rem 0; }
    .grid { display: grid; gap: 1.4rem; }
    .three { grid-template-columns: repeat(3,1fr); }
    .two   { grid-template-columns: repeat(2,1fr); }

    /* ── ILLUSTRATION CARD ── */
    .illus-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      display: flex; flex-direction: column;
    }
    .illus-top {
      padding: 1.8rem 2rem 1.2rem;
      background: linear-gradient(150deg, color-mix(in srgb, var(--accent) 9%, var(--surface)), var(--surface));
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      display: flex; justify-content: center;
    }
    .illus-top svg { width: 100%; max-width: 220px; height: auto; }
    .illus-body { padding: 1.2rem 1.5rem 1.4rem; }

    /* ── NOTE ── */
    .note {
      background: color-mix(in srgb, var(--accent) 8%, var(--surface-2));
      border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border));
      border-left: 3px solid var(--accent);
      border-radius: var(--r-md); padding: 1rem 1.2rem;
      margin-top: 1.2rem;
    }

    /* ── REFERENCES ── */
    .reference-list { display: grid; gap: .8rem; margin-top: 1rem; }
    .reference-item {
      padding: .9rem 1.1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r-md);
      font-size: .88rem;
    }
    .reference-item a { word-break: break-all; }

    /* ── FOOTER ── */
    footer { padding: 2.5rem 0 3.5rem; color: var(--muted); font-size: .9rem; border-top: 1px solid var(--border); margin-top: 1rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-grid, .three, .two { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .top-controls { width: 100%; }
      .lang-select { flex: 1; min-width: 0; }
    }
  </style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg-canvas" aria-hidden="true">

</div>

<script>
(function(){
  /* ── BUBBLES ── */
  const bc = document.getElementById('bubbleContainer');
  for(let i=0;i<14;i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = 10 + Math.random()*30;
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${10+Math.random()*20}s;animation-delay:${Math.random()*18}s;`;
    bc.appendChild(b);

  /* ── THEME ── */
  const root = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');
  let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);
  const syncTheme = () => themeBtn.textContent = root.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
  syncTheme();
  themeBtn.addEventListener('click', ()=>{
    root.setAttribute('data-theme', root.getAttribute('data-theme')==='dark'?'light':'dark');
    syncTheme();
  });

  /* ── SVG ILLUSTRATIONS ── */
  const SVG = {
    interdental: `<svg viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <rect x="28" y="40" width="52" height="90" rx="12" fill="white" stroke="#cddbd7" stroke-width="2"/>

      <!-- gap -->
      <rect x="140" y="40" width="52" height="90" rx="12" fill="white" stroke="#cddbd7" stroke-width="2"/>
      <rect x="140" y="40" width="52" height="20" rx="6" fill="#e8f5f3"/>
      <!-- interdental brush -->
      <rect x="97" y="72" width="26" height="5" rx="2.5" fill="#00857a"/>
      <line x1="82" y1="74.5" x2="97" y2="74.5" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
      <!-- bristles -->
      <g stroke="#00857a" stroke-width="1.5" stroke-linecap="round">
        <line x1="100" y1="69" x2="100" y2="64"/><line x1="100" y1="80" x2="100" y2="85"/>
        <line x1="104" y1="68" x2="104" y2="63"/><line x1="104" y1="81" x2="104" y2="86"/>
        <line x1="108" y1="69" x2="108" y2="64"/><line x1="108" y1="80" x2="108" y2="85"/>
        <line x1="112" y1="68" x2="112" y2="63"/><line x1="112" y1="81" x2="112" y2="86"/>
        <line x1="116" y1="69" x2="116" y2="64"/><line x1="116" y1="80" x2="116" y2="85"/>
        <line x1="120" y1="68" x2="120" y2="63"/><line x1="120" y1="81" x2="120" y2="86"/>
      </g>
      <!-- plaque dots being removed -->
      <circle cx="134" cy="72" r="3" fill="#00857a" opacity=".4"/>
      <circle cx="138" cy="76" r="2" fill="#00857a" opacity=".3"/>
    </svg>`,

    bridge: `<svg viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Left abutment tooth -->
      <rect x="14" y="42" width="48" height="88" rx="11" fill="white" stroke="#cddbd7" stroke-width="2"/>
      <rect x="14" y="42" width="48" height="18" rx="6" fill="#e8f5f3"/>
      <!-- Bridge pontic -->
      <rect x="62" y="58" width="96" height="72" rx="10" fill="#f0faf9" stroke="#cddbd7" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="110" y="100" text-anchor="middle" font-size="11" fill="#7a9992" font-family="Satoshi,sans-serif">mostiček</text>
      <!-- Right abutment tooth -->
      <rect x="158" y="42" width="48" height="88" rx="11" fill="white" stroke="#cddbd7" stroke-width="2"/>
      <rect x="158" y="42" width="48" height="18" rx="6" fill="#e8f5f3"/>
      <!-- Superfloss path -->
      <path d="M 38 155 Q 110 125 182 155" stroke="#00857a" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="5 3" fill="none"/>
      <!-- Arrow -->
      <path d="M180 148 L182 155 L175 154" stroke="#00857a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`,

    denture: `<svg viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <rect x="58" y="40" width="34" height="70" rx="10" fill="white" stroke="#cddbd7" stroke-width="2" opacity=".5"/>
    </svg>`,

    floss: `<svg viewBox="0 0 220 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Floss container -->
      <rect x="70" y="20" width="80" height="55" rx="12" fill="#00857a" opacity=".15" stroke="#00857a" stroke-width="1.5"/>

      <text x="110" y="52" text-anchor="middle" font-size="11" fill="#00857a" font-weight="700" font-family="Satoshi,sans-serif">floss</text>
      <!-- Teeth -->
      <rect x="20" y="68" width="44" height="72" rx="10" fill="white" stroke="#cddbd7" stroke-width="2"/>
      <rect x="156" y="68" width="44" height="72" rx="10" fill="white" stroke="#cddbd7" stroke-width="2"/>
      <!-- Floss between teeth -->
      <path d="M64 100 L64 85 Q64 75 80 75 L110 75 L140 75 Q156 75 156 85 L156 100" stroke="#00857a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- Plaque spots -->
      <circle cx="88" cy="90" r="3.5" fill="#00857a" opacity=".4"/>
      <circle cx="110" cy="80" r="3" fill="#00857a" opacity=".3"/>

        { title:'Важливе правило', body:'У роті діє золоте правило: поверхні мають бути гладкими. Тому не використовуйте грубі пасти або абразиви для протезів.\n\nМеханічне чищення завжди найважливіше. Ополіскувач не замінює щітку, нитку або суперфлос.' },
        { illus:'electric', title:'Електрична зубна щітка', body:'Електрична щітка може бути відмінним вибором — дослідження показують, що вона часто краще знижує наліт, гінгівіт і кровоточивість.\n\nОсобливо корисна при мостах, брекетах, протезах або швидкому накопиченні нальоту.' }
      ],
      cards3:[
        { illus:'floss', title:'Нитка або міжзубна щітка', body:'Якщо дозволяє простір, міжзубна щітка зазвичай краща.\n\nЗубна нитка дуже корисна там, де контакт надто тісний для щітки.' },
        { title:'Коли використовувати хлоргексидин', body:'Ополіскувач з хлоргексидином може короткочасно допомогти при запаленні ясен, але не рекомендується для постійного щоденного вживання. Механічне чищення завжди важливіше.' },
        { illus:'telescope', title:'Телескопічні протези', body:'Первинні телескопи чистіть як зуби: м\'якою щіткою та однопучковою щіткою.\n\nВторинні телескопи очищуйте поза ротом щіткою для протезів і м\'яким засобом. Не труть внутрішні поверхні абразивами.' }
      ],
      cards2b:[
        { illus:'schedule', title:'Коли записатися до лікаря', body:'', list:['Якщо кровоточивість або чутливість ясен не покращились за 2 тижні.','Якщо їжа постійно застрягає під мостом.','Якщо протез натирає, пахне, хитається або спричиняє виразки.','Якщо помічаєте стійкий запах з рота або швидке накопичення нальоту.'] },
        { title:'Професійна гігієна', body:'Рекомендується відвідувати гігієніста не рідше одного разу на рік. Деякі зони просто неможливо достатньо добре очистити вдома.' }
      ],
      note:'Для найкращої домашньої рутини: щодня очищуйте міжзубні проміжки, потім чистіть зуби, регулярні огляди та м\'яка, послідовна техника.'
    }
  };

  /* Dialectal variants inherit from Slovenian */
  ['st','ko','pr','pm','lj'].forEach(code => {
    const titleMap = {
      st:'Kak si vsak dan dobro spucaš zobe, mostiček pa protezo',
      ko:'Kak si vsak dan dobro spucaš zobe, most pa protezo',
      pr:'Kako si vsak dan dobro umiješ zobe, mostiček in protezo',
      pm:'Kak si vsak den dobro spucaš zobe, mostek pa protezo',
      lj:'Kako si vsak dan dobro spucaš zobe, mostiček in protezo'
    };
    const subMap = {
      st:'mostički, medzobni prostori pa proteze',
      ko:'mosti, medzobni prostori pa proteze',
      pr:'mostički, medzobni prostori in proteze',
      pm:'mosteki, medzobni prostori pa proteze',
      lj:'mostički, medzobni prostori in proteze'
    };
    const ql1 = {
      st:'Na kratko', ko:'Na kratko', pr:'Na kratko', pm:'Na kratko', lj:'Na kratko'
    };
    const base = langs.sl;
    langs[code] = JSON.parse(JSON.stringify(base));
    langs[code].htmlLang = 'sl';
    langs[code].ui.brand_sub = subMap[code];
    langs[code].hero_title = titleMap[code];
    langs[code].quicklist_title = ql1[code];
  });

  /* ── REFERENCES HTML ── */
  const refHTML = `<section class="container" id="reference" style="padding-bottom:2rem">
    <div class="card">
      <h2 id="references_title">Reference</h2>
      <p class="lede" id="references_intro" style="margin-bottom:1rem"></p>
      <div class="reference-list">
        ${[
          ['Home use of interdental cleaning devices, in addition to toothbrushing','https://pmc.ncbi.nlm.nih.gov/articles/PMC6953268/'],
          ['A Network Meta-analysis of Interproximal Oral Hygiene Methods','https://pmc.ncbi.nlm.nih.gov/articles/PMC5984142/'],
          ['EFP guidance on interdental cleaning','https://www.efp.org/news-events/news/efp-provides-clear-guidance-to-public-on-interdental-cleaning-in-response-to-media-controversy/'],
          ['Evidence-based strategies for interdental cleaning','https://pubmed.ncbi.nlm.nih.gov/32954389/'],
          ['Influence of oral hygiene on mucosal conditions beneath bridge pontics','https://pubmed.ncbi.nlm.nih.gov/3321391/'],
          ['Evidence-based guidelines for the care and maintenance of complete dentures','https://www.prosthodontics.org/assets/1/7/7._JOP_Denture_Care_Guidelines_Supplement1.pdf'],
          ['Denture care and maintenance','https://www.ada.org/resources/ada-library/oral-health-topics/dentures'],
          ['The efficacy of powered toothbrushes','https://pmc.ncbi.nlm.nih.gov/articles/PMC9303421/'],
          ['Mouthrinse (Mouthwash)','https://www.ada.org/resources/ada-library/oral-health-topics/mouthrinse-mouthwash'],
          ['Oral hygiene aids','https://www.periodontalcare.sdcep.org.uk/guidance/treatment-components/managing-risk-factors/oral-hygiene/oral-hygiene-aids/'],
          ['Interdental brushes versus dental floss','https://pubmed.ncbi.nlm.nih.gov/9706852/'],
          ['Effect of toothbrushing and flossing sequence','https://pubmed.ncbi.nlm.nih.gov/29741239/'],
          ['Effect of denture cleaning on abrasion resistance','https://pmc.ncbi.nlm.nih.gov/articles/PMC5498689/']
        ].map(([t,u])=>`<div class="reference-item"><strong>${t}</strong><br><a href="${u}" target="_blank" rel="noopener noreferrer">${u}</a></div>`).join('')}
      </div>
    </div>
  </section>`;

  /* ── RENDER ENGINE ── */
  function buildCard(c, size) {
    if(c.illus) {
      return `<article class="illus-card">
        <div class="illus-top">${SVG[c.illus]||''}</div>
        <div class="illus-body">
          <h3>${c.title}</h3>
          ${c.steps ? `<ol class="steps">${c.steps.map(s=>`<li>${s}</li>`).join('')}</ol>` : ''}
          ${c.list  ? `<ul class="clean" style="margin-top:.6rem">${c.list.map(s=>`<li>${s}</li>`).join('')}</ul>` : ''}
          ${c.body  ? c.body.split('\n\n').map(p=>`<p>${p}</p>`).join('') : ''}
        </div>
      </article>`;
    }
    return `<article class="card">
      <h${size||3}>${c.title}</h${size||3}>
      ${c.steps ? `<ol class="steps">${c.steps.map(s=>`<li>${s}</li>`).join('')}</ol>` : ''}
      ${c.list  ? `<ul class="clean" style="margin-top:.6rem">${c.list.map(s=>`<li>${s}</li>`).join('')}</ul>` : ''}
      ${c.body  ? c.body.split('\n\n').map(p=>`<p>${p}</p>`).join('') : ''}
    </article>`;
  }

  function render(langCode) {
    const lang = langs[langCode] || langs.sl;
    const d = document.documentElement;
    d.lang = lang.htmlLang || langCode;
    d.dir  = lang.dir || 'ltr';
    document.body.dir = lang.dir || 'ltr';

    // Update header labels
    const ui = lang.ui;
    document.getElementById('brand_title').textContent    = ui.brand_title;
    document.getElementById('brand_sub').textContent      = ui.brand_sub;
    document.getElementById('language_label').textContent = ui.language_label;
    document.getElementById('references_link').textContent= ui.references_link;
    document.getElementById('footer_text').textContent    = ui.footer_text;

    // Build page
    const heroCard = `<aside class="hero-card">
      <h2>${lang.quicklist_title}</h2>
      <ul class="clean">${lang.quicklist.map(i=>`<li>${i}</li>`).join('')}</ul>
    </aside>`;

    const sectionsHTML = `<section class="container">
      <div class="grid three">
        ${lang.sections.map(s=>buildCard(s)).join('')}
      </div>
    </section>`;

    const cards2HTML = `<section class="container">
      <div class="grid two">
        ${lang.cards2.map(c=>buildCard(c,2)).join('')}
      </div>
    </section>`;

    const cards3HTML = `<section class="container">
      <div class="grid three">
        ${lang.cards3.map(c=>buildCard(c,3)).join('')}
      </div>
    </section>`;

    const cards2bHTML = `<section class="container">
      <div class="grid two">
        ${lang.cards2b.map(c=>buildCard(c,2)).join('')}
      </div>
      <div class="note">${lang.note}</div>
    </section>`;

    document.getElementById('main').innerHTML = `
      <section class="hero container" id="top">
        <div class="hero-grid">
          <div>
            <h1>${lang.hero_title}</h1>
            <p class="lede">${lang.hero_lede}</p>
          </div>
          ${heroCard}
        </div>
      </section>
      ${sectionsHTML}
      ${cards2HTML}
      ${cards3HTML}
      ${cards2bHTML}
      ${refHTML}
    `;

    // Update refs
    const rTitle = document.getElementById('references_title');
    const rIntro = document.getElementById('references_intro');
    if(rTitle) rTitle.textContent = ui.references_title;
    if(rIntro) rIntro.textContent = ui.references_intro;

    // Calendar month label in SVG
    const calEl = document.getElementById('cal-month');
    if(calEl) calEl.textContent = ui.cal_month || 'APRIL';
  }

  /* ── EVENTS ── */
  document.getElementById('languageSelect').addEventListener('change', e => render(e.target.value));
  render('sl');
})();
</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
</html>
